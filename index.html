<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PriceChecker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hero">
    <h1>PriceChecker</h1>
    <p class="tagline">Find out what your product is worth</p>
    <button id="openFormBtn" class="btn-primary">Check price</button>
  </div>

  <div id="overlay" class="overlay hidden"></div>

  <div id="modal" class="modal hidden">
    <button id="closeBtn" class="close-btn" aria-label="Close">&times;</button>
    <h2>Enter product information</h2>

    <form id="priceForm">

      <div class="upload-area" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*" hidden />
        <img id="preview" src="" alt="Image preview" class="hidden" />
        <div id="uploadPlaceholder">
          <span class="upload-icon">&#128247;</span>
          <p>Click or drag image here</p>
        </div>
      </div>

      <div class="form-group">
        <label for="productName">Product name *</label>
        <input type="text" id="productName" placeholder="E.g. iPhone 14 Pro" required />
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" required>
          <option value="" disabled selected>Select category</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing &amp; shoes</option>
          <option value="furniture">Furniture &amp; interior</option>
          <option value="sports">Sports &amp; leisure</option>
          <option value="books">Books &amp; media</option>
          <option value="toys">Toys &amp; games</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="condition">Condition *</label>
          <select id="condition" required>
            <option value="" disabled selected>Select condition</option>
            <option value="new">New / unused</option>
            <option value="like-new">Like new</option>
            <option value="used">Used</option>
            <option value="worn">Worn</option>
          </select>
        </div>

        <div class="form-group">
          <label for="age">Age (years)</label>
          <input type="number" id="age" placeholder="E.g. 2" min="0" max="100" />
        </div>
      </div>

      <div class="form-group">
        <label for="description">Additional information</label>
        <textarea id="description" rows="3" placeholder="Any damage, included accessories, purchase date, etc."></textarea>
      </div>

      <button type="submit" class="btn-primary btn-full">Get price estimate</button>
    </form>

    <div id="result" class="result hidden"></div>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
